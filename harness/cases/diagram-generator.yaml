cases:
  - id: diagram-generator-description-html
    skill: diagram-generator
    input: "Create an architecture diagram for a SaaS app with browser clients, API gateway, auth service, billing service, PostgreSQL, Redis cache, event queue, worker, Stripe, and email provider."
    expect:
      - "Produces self-contained HTML as the primary artifact"
      - "Groups components by clear system boundaries"
      - "Uses distinct visual treatment for external services, data stores, and async queue"
      - "Includes assumptions instead of inventing missing deployment details"

  - id: diagram-generator-code-to-architecture
    skill: diagram-generator
    input: "Turn this code sketch into an HTML component/dependency diagram: routes call OrderController, OrderController calls OrderService, OrderService writes OrderRepository and publishes PaymentRequested to EventBus; PaymentWorker consumes the event and calls PaymentGateway."
    expect:
      - "Reflects only relationships present in the supplied code sketch"
      - "Shows sync calls separately from async event flow"
      - "Uses code identifiers or faithful human-readable labels"
      - "Flags inferred runtime behavior as assumptions"

  - id: diagram-generator-multi-view
    skill: diagram-generator
    input: "Generate diagrams for a checkout flow that includes user cart review, coupon validation, payment authorization, inventory reservation, order creation, async fulfillment, and error handling for payment decline or stockout."
    expect:
      - "Splits complex content into more than one view when useful"
      - "Includes a flowchart for decisions and a sequence or architecture view for service interactions"
      - "Labels happy path, error path, and async fulfillment clearly"
      - "Keeps the HTML readable without external dependencies"
